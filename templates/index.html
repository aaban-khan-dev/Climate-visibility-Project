<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Climate Visibility Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section>
    <div class="container-fluid">
        <div class="container">

            <form action="/predict" method="post">
                <h1><b>Climate Visibility Prediction</b></h1>

                <div class="mb-3">
                    <label><b>DRYBULBTEMPF</b></label>
                    <input class="form-control" type="number" name="drybulbtempf" />
                </div>

                <div class="mb-3">
                    <label><b>RelativeHumidity</b></label>
                    <input class="form-control" type="number" name="relativehumidity" />
                </div>

                <div class="mb-3">
                    <label><b>WindSpeed</b></label>
                    <input class="form-control" type="number" name="windspeed" />
                </div>

                <div class="mb-3">
                    <label><b>WindDirection</b></label>
                    <input class="form-control" type="number" name="winddirection" />
                </div>

                <div class="mb-3">
                    <label><b>SeaLevelPressure</b></label>
                    <input class="form-control" type="number" name="sealevelpressure" />
                </div>

                <div class="mb-3">
                    <input class="btn btn-primary" type="submit" value="Predict" />
                </div>
            </form>

        </div>
    </div>
</section>

<hr>

<h3>⚙️ Model Status:</h3>
<p id="modelStatus">
    {% if model_exists %}
        ✅ Model is already trained
    {% else %}
        ❌ Model not found (training required)
    {% endif %}
</p>

<div class="mb-3">
    <button id="startBtn" class="btn btn-success" onclick="startTraining()">Start Training</button>
    <button class="btn btn-danger" onclick="cancelTraining()">Cancel</button>
</div>

<div class="progress mb-3">
    <div id="progressBar"
         class="progress-bar progress-bar-striped progress-bar-animated"
         role="progressbar"
         style="width: 0%">
        0%
    </div>
</div>

<p id="statusText">Status: Idle</p>


<script>
function startTraining() {
    document.getElementById("startBtn").disabled = true;
    fetch('/start_training')
    updateProgress()
}

function cancelTraining() {
    fetch('/cancel_training')
    document.getElementById("statusText").innerText = "Status: Cancelling..."
}

function updateProgress() {
    let interval = setInterval(() => {
        fetch('/training_status')
        .then(res => res.json())
        .then(data => {

            document.getElementById("statusText").innerText =
                "Status: " + data.status

            let progress = data.progress
            let bar = document.getElementById("progressBar")

            bar.style.width = progress + "%"
            bar.innerText = progress + "%"

            if (data.status === "completed") {
                document.getElementById("modelStatus").innerText =
                    "✅ Model is now trained"

                document.getElementById("statusText").innerText =
                    "Status: completed"
            }

            if (data.status === "completed" || data.status === "cancelled") {
                clearInterval(interval)
                document.getElementById("startBtn").disabled = false
            }

        })
    }, 1000)
}
</script>

</body>
</html>
